esphome:
  name: air-quality-sensor
  friendly_name: air-quality-sensor
  includes:
    - wifi_icon.h

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "your-key-here"

ota:
  - platform: esphome
    password: "your-password-here"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  fast_connect: True

  # manual_ip:
  #   static_ip: 192.168.0.99
  #   gateway: 192.168.0.1
  #   subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Air-Quality-Sensor"
    password: "your-password-here"

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time
    
i2c:
  sda: 4
  scl: 5
  scan: true

sensor:
  - platform: sen5x
    id: AQS
    pm_1_0:
      name: " PM <1µm Weight concentration"
      id: pm_1_0
      accuracy_decimals: 1
    pm_2_5:
      name: " PM <2.5µm Weight concentration"
      id: pm_2_5
      accuracy_decimals: 1
    pm_4_0:
      name: " PM <4µm Weight concentration"
      id: pm_4_0
      accuracy_decimals: 1
    pm_10_0:
      name: " PM <10µm Weight concentration"
      id: pm_10_0
      accuracy_decimals: 1
    temperature:
      name: "Temperature"
      id: temp
      accuracy_decimals: 1
    humidity:
      name: "Humidity"
      id: humidity
      accuracy_decimals: 0
    voc:
      name: "VOC"
      id: voc
      algorithm_tuning:
        index_offset: 100
        learning_time_offset_hours: 12
        learning_time_gain_hours: 12
        gating_max_duration_minutes: 180
        std_initial: 50
        gain_factor: 230
    nox:
      name: "NOX"
      id: nox
      algorithm_tuning:
        index_offset: 100
        learning_time_offset_hours: 12
        learning_time_gain_hours: 12
        gating_max_duration_minutes: 180
        std_initial: 50
        gain_factor: 230
    temperature_compensation:
      offset: 0
      normalized_offset_slope: 0
      time_constant: 0
    acceleration_mode: low
    store_baseline: true
    #address: 0x69
    update_interval: 10s

  # AQI (US EPA) from PM2.5 - piecewise linear
  - platform: template
    id: aqi
    name: "AQI"
    accuracy_decimals: 0
    lambda: |-
      float pm = id(pm_2_5).state;
      if (std::isnan(pm) || pm < 0) return 0.0f;
      if (pm <= 12.0f) return pm * (50.0f / 12.0f);
      if (pm <= 35.4f) return 50.0f + (pm - 12.0f) * (50.0f / 23.4f);
      if (pm <= 55.4f) return 100.0f + (pm - 35.4f) * (50.0f / 20.0f);
      if (pm <= 150.4f) return 150.0f + (pm - 55.4f) * (50.0f / 95.0f);
      if (pm <= 250.4f) return 200.0f + (pm - 150.4f) * (100.0f / 100.0f);
      if (pm <= 500.0f) return 300.0f + (pm - 250.4f) * (200.0f / 249.6f);
      return 500.0f;
    update_interval: 10s

  - platform: wifi_signal # Reports the WiFi signal strength in %
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    id: wifi_signal_pct
    update_interval: 60s
    entity_category: "diagnostic"
    internal: True

font:
  - file: "DejaVuSansMono.ttf"
    id: extra_small
    size: 10
  - file: "DejaVuSansMono.ttf"
    id: small
    size: 12
  - file: "DejaVuSansMono.ttf"
    id: medium
    size: 16
  - file: "DejaVuSansMono.ttf"
    id: large
    size: 24
  - file: "DejaVuSansMono.ttf"
    id: verylarge
    size: 30

  # Material Design Icons - https://cdn.jsdelivr.net/npm/@mdi/font@5.4.55/
  - file: "materialdesignicons-webfont.ttf"
    id: mdi_small
    size: 12
    glyphs: [
        "󰤮", # no-wifi
        "󰤯", # low-wifi
        "󰤟", # wifi-1
        "󰤢", # wifi-2
        "󰤥", # wifi-3
        "󰤨", # wifi-4
     ]

globals:
  - id: display_view
    type: int
    restore_value: no
    initial_value: '0'

interval:
  - interval: 10s
    then:
      - lambda: |-
          id(display_view) = (id(display_view) + 1) % 4;

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    lambda: |-
      int v = id(display_view);
      it.strftime(5, 0, id(extra_small), TextAlign::TOP_LEFT, "%b %d %I:%M %p", id(homeassistant_time).now());
      it.print(127, 0, id(mdi_small), TextAlign::TOP_RIGHT, wifi_icon(id(wifi_signal_pct).state));
      // Font heights: small 10px, medium 14px, large 20px. Display 128x64.
      if (v == 0) {
        // View 0: Big AQI
        it.printf(5, 33, id(verylarge), TextAlign::CENTER_LEFT, "AQI");
        it.printf(122, 33, id(verylarge), TextAlign::CENTER_RIGHT, "%.0f", id(aqi).state);
        it.printf(0, 63, id(extra_small), TextAlign::BASELINE_LEFT, "PM2.5");
        it.printf(60, 63, id(small), TextAlign::BASELINE_RIGHT, "%.0f", id(pm_2_5).state);
        it.printf(66, 63, id(extra_small), TextAlign::BASELINE_LEFT, "PM10");
        it.printf(127, 63, id(small), TextAlign::BASELINE_RIGHT, "%.0f", id(pm_10_0).state);
      } else if (v == 1) {
        // View 1: PM breakdown
        it.printf(0, 26, id(extra_small), TextAlign::CENTER_LEFT, "PM1");
        it.printf(60, 26, id(medium), TextAlign::CENTER_RIGHT, "%.0f", id(pm_1_0).state);
        it.printf(66, 26, id(extra_small), TextAlign::CENTER_LEFT, "PM4");
        it.printf(127, 26, id(medium), TextAlign::CENTER_RIGHT, "%.0f", id(pm_4_0).state);
        it.printf(0, 52, id(extra_small), TextAlign::CENTER_LEFT, "PM2.5");
        it.printf(60, 52, id(medium), TextAlign::CENTER_RIGHT, "%.0f", id(pm_2_5).state);
        it.printf(66, 52, id(extra_small), TextAlign::CENTER_LEFT, "PM10");
        it.printf(127, 52, id(medium), TextAlign::CENTER_RIGHT, "%.0f", id(pm_10_0).state);
      } else if (v == 2) {
        // View 2: Big VOC & NOX
        it.printf(5, 28, id(medium), TextAlign::CENTER_LEFT, "VOC");
        it.printf(120, 28, id(medium), TextAlign::CENTER_RIGHT, "%.0f", id(voc).state);
        it.printf(5, 52, id(medium), TextAlign::CENTER_LEFT, "NOX");
        it.printf(120, 52, id(medium), TextAlign::CENTER_RIGHT, "%.0f", id(nox).state);
      } else if (v == 3) {
        // View 3: Big Temp & Humidity
        it.printf(5, 28, id(medium), TextAlign::CENTER_LEFT, "TEMP");
        it.printf(126, 28, id(medium), TextAlign::CENTER_RIGHT, "%.1f C", id(temp).state);
        it.printf(5, 52, id(medium), TextAlign::CENTER_LEFT, "HUM");
        it.printf(126, 52, id(medium), TextAlign::CENTER_RIGHT, "%.1f %%", id(humidity).state);
      }
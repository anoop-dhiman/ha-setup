esphome:
  name: air-quality-sensor
  friendly_name: air-quality-sensor

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "64OyminhQY7voF14GwpnerTJvoZlFdHGqU6rPvQNytM="

ota:
  - platform: esphome
    password: "bcf7d39ca63e102360c2db0d082c9c5a"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  fast_connect: True

  manual_ip:
    static_ip: 192.168.0.99
    gateway: 192.168.0.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Air-Quality-Sensor"
    password: "5b1bZyd8x7ID"

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time
    
i2c:
  sda: 4
  scl: 5
  scan: true

sensor:
  - platform: sen5x
    id: AQS
    pm_1_0:
      name: " PM <1µm Weight concentration"
      id: pm_1_0
      accuracy_decimals: 1
    pm_2_5:
      name: " PM <2.5µm Weight concentration"
      id: pm_2_5
      accuracy_decimals: 1
    pm_4_0:
      name: " PM <4µm Weight concentration"
      id: pm_4_0
      accuracy_decimals: 1
    pm_10_0:
      name: " PM <10µm Weight concentration"
      id: pm_10_0
      accuracy_decimals: 1
    temperature:
      name: "Temperature"
      id: temp
      accuracy_decimals: 1
    humidity:
      name: "Humidity"
      id: humidity
      accuracy_decimals: 0
    voc:
      name: "VOC"
      id: voc
      algorithm_tuning:
        index_offset: 100
        learning_time_offset_hours: 12
        learning_time_gain_hours: 12
        gating_max_duration_minutes: 180
        std_initial: 50
        gain_factor: 230
    nox:
      name: "NOX"
      id: nox
      algorithm_tuning:
        index_offset: 100
        learning_time_offset_hours: 12
        learning_time_gain_hours: 12
        gating_max_duration_minutes: 180
        std_initial: 50
        gain_factor: 230
    temperature_compensation:
      offset: 0
      normalized_offset_slope: 0
      time_constant: 0
    acceleration_mode: low
    store_baseline: true
    #address: 0x69
    update_interval: 10s

font:
  - file: "DejaVuSansMono.ttf"
    id: small
    size: 10

globals:
  - id: display_view
    type: int
    restore_value: no
    initial_value: '0'

interval:
  - interval: 5s   # change to whatever seconds you want (e.g. 10s)
    then:
      - lambda: |-
          id(display_view) = (id(display_view) + 1) % 2;

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    lambda: |-
      if (id(display_view) == 0) {
        // View 1: detailed list
        it.printf(0, 0, id(small), TextAlign::TOP_LEFT, "Time");
        it.strftime(127, 0, id(small), TextAlign::TOP_RIGHT, "%H:%M", id(homeassistant_time).now());
        it.printf(0, 12, id(small), TextAlign::TOP_LEFT, "PM1");
        it.printf(61, 12, id(small), TextAlign::TOP_RIGHT , "%.0f", id(pm_1_0).state);
        it.printf(66, 12, id(small), TextAlign::TOP_LEFT, "PM2.5");
        it.printf(127, 12, id(small), TextAlign::TOP_RIGHT , "%.0f", id(pm_2_5).state);
        it.printf(0, 24, id(small), TextAlign::TOP_LEFT, "PM4");
        it.printf(61, 24, id(small), TextAlign::TOP_RIGHT , "%.0f", id(pm_4_0).state);
        it.printf(66, 24, id(small), TextAlign::TOP_LEFT, "PM10");
        it.printf(127, 24, id(small), TextAlign::TOP_RIGHT , "%.0f", id(pm_10_0).state);
        it.printf(0, 36, id(small), TextAlign::TOP_LEFT, "VOC");
        it.printf(61, 36, id(small), TextAlign::TOP_RIGHT , "%.0f", id(voc).state);
        it.printf(66, 36, id(small), TextAlign::TOP_LEFT, "NOX");
        it.printf(127, 36, id(small), TextAlign::TOP_RIGHT , "%.0f", id(nox).state);
        it.printf(0, 48, id(small), TextAlign::TOP_LEFT, "TEMP");
        it.printf(61, 48, id(small), TextAlign::TOP_RIGHT , "%.1f", id(temp).state);
        it.printf(66, 48, id(small), TextAlign::TOP_LEFT, "HUM");
        it.printf(127, 48, id(small), TextAlign::TOP_RIGHT , "%.0f", id(humidity).state);
      } else {
        // View 2: e.g. big PM2.5 + time
        it.printf(0, 0, id(small), TextAlign::TOP_LEFT, "Time");
        it.strftime(127, 0, id(small), TextAlign::TOP_RIGHT, "%H:%M", id(homeassistant_time).now());
        it.printf(0, 24, id(small), TextAlign::TOP_LEFT, "PM2.5");
        it.printf(127, 24, id(small), TextAlign::TOP_RIGHT, "%.0f", id(pm_2_5).state);
        it.printf(0, 48, id(small), TextAlign::TOP_LEFT, "T+C");
        it.printf(61, 48, id(small), TextAlign::TOP_RIGHT, "%.1f", id(temp).state);
        it.printf(66, 48, id(small), TextAlign::TOP_LEFT, "H");
        it.printf(127, 48, id(small), TextAlign::TOP_RIGHT, "%.0f", id(humidity).state);
      }